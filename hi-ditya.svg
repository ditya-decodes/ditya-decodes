<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="blob-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a18cd1" />
      <stop offset="100%" stop-color="#fbc2eb" />
    </linearGradient>

    <path id="blob" fill="url(#blob-grad)">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="M150,100 C150,40 220,50 280,70 C340,90 380,50 380,110 C380,170 320,150 260,160 C200,170 150,160 150,100 Z;
                M150,100 C170,30 250,20 300,60 C350,100 410,90 390,140 C370,190 290,150 230,170 C170,190 130,170 150,100 Z;
                M150,100 C140,50 210,30 290,50 C370,70 370,110 360,150 C350,190 300,160 240,150 C180,140 160,150 150,100 Z;
                M150,100 C150,40 220,50 280,70 C340,90 380,50 380,110 C380,170 320,150 260,160 C200,170 150,160 150,100 Z" />
    </path>

    <clipPath id="blob-clip">
      <use href="#blob" />
    </clipPath>

    <style>
      .text-base {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 56px;
      }
    </style>
  </defs>

  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="text-base" fill="none" stroke="#ffffff" stroke-width="1.5">
    Hi, I'm Ditya!
  </text>

  <use href="#blob" />

  <g clip-path="url(#blob-clip)">
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="text-base" fill="#0d1117">
      Hi, I'm Ditya!
    </text>
  </g>
</svg>
